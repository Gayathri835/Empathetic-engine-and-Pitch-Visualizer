<!DOCTYPE html>
<html>
<head>
    <title>Pitch Visualizer</title>
</head>
<body>

<h1>Pitch Visualizer 🎬</h1>

<form method="POST">
    <textarea name="story" rows="5" cols="50" placeholder="Enter your story..."></textarea><br><br>

    <label>Select Style:</label>
    <select name="style">
        <option value="digital art">Digital Art</option>
        <option value="realistic">Realistic</option>
        <option value="cartoon">Cartoon</option>
    </select>

    <br><br>
    <button type="submit">Generate Storyboard</button>
</form>

<hr>
